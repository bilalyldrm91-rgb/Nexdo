<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İş Takip</title>

<!-- SUPABASE (ÖNCE YÜKLENİR) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:sans-serif;background:#f5f5f5;margin:0}
.box{max-width:400px;margin:80px auto;background:#fff;padding:20px;border-radius:10px}
input,button{width:100%;padding:10px;margin-top:10px}
button{background:#111;color:#fff;border:none;cursor:pointer}
</style>
</head>
<body>

<div id="auth" class="box">
  <h3>Giriş</h3>
  <input id="email" placeholder="email">
  <input id="pass" type="password" placeholder="şifre">
  
  <label>
    <input type="checkbox" id="remember"> Beni hatırla
  </label>

  <button onclick="login()">Giriş Yap</button>
</div>

<div id="app" class="box" style="display:none;">
  <h3>Görevler</h3>

  <input id="taskInput" placeholder="Görev yaz">
  <button onclick="addTask()">Ekle</button>

  <div id="list"></div>

  <button onclick="logout()">Çıkış Yap</button>
</div>

<script>
const SB_URL='https://cvgxwpxvtxedajzrnand.supabase.co';
const SB_KEY='sb_publishable_cJp6p5cSfJwOynI5kCK_2Q_EPP4bijp';

let sb;
let user=null;

// INIT
async function init(){
  if(!window.supabase){
    alert("Supabase yüklenmedi!");
    return;
  }

  sb = window.supabase.createClient(SB_URL, SB_KEY);

  const remember = localStorage.getItem("remember");

  if(remember){
    const {data:{session}} = await sb.auth.getSession();
    if(session){
      user = session.user;
      showApp();
      loadTasks();
      return;
    }
  }

  showAuth();
}

// LOGIN
async function login(){
  const email=document.getElementById('email').value;
  const pass=document.getElementById('pass').value;
  const remember=document.getElementById('remember').checked;

  if(remember) localStorage.setItem("remember","1");

  const {data,error}=await sb.auth.signInWithPassword({email,password:pass});

  if(error){
    alert("Hatalı giriş");
    return;
  }

  user=data.user;
  showApp();
  loadTasks();
}

// LOGOUT
async function logout(){
  await sb.auth.signOut();
  localStorage.removeItem("remember");
  location.reload();
}

// UI
function showApp(){
  document.getElementById('auth').style.display='none';
  document.getElementById('app').style.display='block';
}

function showAuth(){
  document.getElementById('auth').style.display='block';
  document.getElementById('app').style.display='none';
}

// TASK
async function loadTasks(){
  const {data}=await sb.from('tasks').select('*').order('created_at',{ascending:false});
  const list=document.getElementById('list');

  list.innerHTML=(data||[]).map(t=>`
    <div style="background:#eee;margin-top:5px;padding:8px;border-radius:5px">
      ${t.title}
    </div>
  `).join('');
}

async function addTask(){
  const val=document.getElementById('taskInput').value;
  if(!val) return;

  await sb.from('tasks').insert({
    title:val,
    user_id:user.id
  });

  document.getElementById('taskInput').value='';
  loadTasks();
}

init();
</script>

</body>
</html>
